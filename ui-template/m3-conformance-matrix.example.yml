openVrMappings:
- id: xr-spatial-panel
  status: Applicable
  productElement: wrist-overlay-root
  requirements:
  - comfortable-distance
  - scalable-size
  - stable-depth
  - safe-inset
  evidenceIds:
  - XR-LAYOUT-MANUAL
- id: xr-app-bar
  status: Applicable
  productElement: wrist-secondary-top-bar
  requirements:
  - back-close
  - page-title
  - persistent-recording-state
  evidenceIds:
  - COMPONENT-GOLDEN
- id: xr-dialog
  status: Applicable
  productElement: rights-and-compliance-dialogs
  requirements:
  - focus
  - readable-depth
  - stop-reachability
  evidenceIds:
  - DIALOG-A11Y-TEST
  - XR-INPUT-MANUAL
- id: xr-navigation-bar
  status: NotApplicable
  rationale: The wrist surface has too few top-level destinations.
  alternative: Use top app bar plus shallow page stack.
- id: xr-navigation-rail
  status: NotApplicable
  rationale: A rail consumes excessive width on the compact wrist panel.
  alternative: Use a visible settings list.
- id: xr-toolbar
  status: Applicable
  productElement: wrist-legal-actions
  requirements:
  - large-ray-targets
  - labels-or-tooltips
  - stop-not-hidden
  evidenceIds:
  - TARGET-TEST
  - STOP-REACHABILITY
productComponents:
- id: recording-primary
  m3Pattern: filled-icon-button-with-project-large-size-token
  semanticColorRole: recording
  states:
  - enabled
  - hovered
  - focused
  - pressed
  - disabled
  - recording
  symbols:
  - recording.start
  - recording.stop
  requiredCues:
  - icon-shape
  - REC-or-STOP-label
  - elapsed-time
  - haptic-on-transition
- id: microphone-toggle
  m3Pattern: filled-tonal-icon-toggle-button
  states:
  - enabled
  - hovered
  - focused
  - pressed
  - selected
  - disabled
  symbols:
  - audio.microphone.on
  - audio.microphone.off
- id: mute-all-toggle
  m3Pattern: icon-toggle-button
  states:
  - enabled
  - hovered
  - focused
  - pressed
  - selected
  - disabled
  symbols:
  - audio.muteAll
- id: timer-selector
  m3Pattern: segmented-button-or-menu
  states:
  - enabled
  - focused
  - selected
  - disabled
  symbols:
  - timer.self
  - timer.autoStop
- id: no-signal-state
  m3Pattern: persistent-fault-card-or-state-screen
  semanticColorRole: error
  states:
  - active
  - retrying
  - disabled
  symbols:
  - signal.none
  - common.retry
- id: overlay-positioning
  m3Pattern: drag-handle-plus-equivalent-button-controls
  states:
  - enabled
  - focused
  - pressed
  - dragging
  - pinned
