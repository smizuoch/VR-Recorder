# DESIGN-TIME EXAMPLE — generated from the source inventory and profile.
# Every official source entry must be represented exactly once.
schemaVersion: 2
documentStatus: DESIGN-TIME EXAMPLE — regenerate from the reviewed official M3 source inventory for every release.
snapshot:
  designSystem: Material Design 3
  reviewedAt: '2026-07-10'
  sourceInventory: ui-template/m3-source-inventory.example.yml
  sourceInventoryDigest: <sha256>
  profile: ui-template/m3-conformance-profile.example.yml
  profileDigest: <sha256>
coveragePolicy:
  requiredCoveragePercent: 100
  maximumUnclassifiedSourceEntries: 0
  maximumUnresolvedDeviations: 0
  maximumDeferredEntriesForShippedFeatures: 0
  everyNotApplicableRequiresRationaleAndAlternative: true
  everyApplicableRequiresEvidenceIds: true
  googleCertificationClaimAllowed: false
  googleEndorsementClaimAllowed: false
surfaces:
  desktop:
    technology: WPF
    usesSharedSemanticTokens: true
    inputModalities:
    - mouse
    - keyboard
    - touch
    - accessibility-api
  wrist:
    technology: OpenVR Overlay
    usesSharedSemanticTokens: true
    m3XrProfile: true
    inputModalities:
    - controller-ray
    - trigger
    - steamvr-input-action
    - accessibility-api
    placementModes:
    - wrist-dock
    - world-pin
