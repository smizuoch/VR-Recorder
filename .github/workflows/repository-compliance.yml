name: Repository Compliance

on:
  pull_request:
    paths:
      - .github/workflows/repository-compliance.yml
      - .github/workflows/store-msix.yml
      - README.md
      - '*-template/README.md'
      - legal-template/**
      - third-party/**
      - '**/packages.lock.json'
      - CMakeLists.txt
      - CMakePresets.json
      - cmake/**
      - eng/build-ffmpeg-contract-test-sdk.sh
      - eng/build-ffmpeg-contract-oracle-sdk.sh
      - eng/build-ffmpeg-windows-production-sdk.ps1
      - eng/build-store-msix.ps1
      - eng/ffmpeg-windows-production-build-recipe.md
      - eng/build-ffmpeg-windows-oracle-sdk.ps1
      - eng/ffmpeg-windows-oracle-build-recipe.md
      - eng/patches/ffmpeg-8.1.2/**
      - src/VRRecorder.Native/**
      - tests/cmake/**
      - tests/VRRecorder.Native.Tests/**
      - Directory.Build.props
      - Directory.Packages.props
      - global.json
      - src/VRRecorder.Compliance/**
      - src/VRRecorder.ReleaseTool/**
      - src/VRRecorder.StorePackaging/**
      - tests/VRRecorder.Compliance.Tests/**
  push:
    paths:
      - .github/workflows/repository-compliance.yml
      - .github/workflows/store-msix.yml
      - README.md
      - '*-template/README.md'
      - legal-template/**
      - third-party/**
      - '**/packages.lock.json'
      - CMakeLists.txt
      - CMakePresets.json
      - cmake/**
      - eng/build-ffmpeg-contract-test-sdk.sh
      - eng/build-ffmpeg-contract-oracle-sdk.sh
      - eng/build-ffmpeg-windows-production-sdk.ps1
      - eng/build-store-msix.ps1
      - eng/ffmpeg-windows-production-build-recipe.md
      - eng/build-ffmpeg-windows-oracle-sdk.ps1
      - eng/ffmpeg-windows-oracle-build-recipe.md
      - eng/patches/ffmpeg-8.1.2/**
      - src/VRRecorder.Native/**
      - tests/cmake/**
      - tests/VRRecorder.Native.Tests/**
      - Directory.Build.props
      - Directory.Packages.props
      - global.json
      - src/VRRecorder.Compliance/**
      - src/VRRecorder.ReleaseTool/**
      - src/VRRecorder.StorePackaging/**
      - tests/VRRecorder.Compliance.Tests/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readme-parity:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact revision
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          $server = $env:GITHUB_SERVER_URL -replace '^https://', "https://x-access-token:$env:GH_TOKEN@"
          git remote add origin "$server/$env:GITHUB_REPOSITORY.git"
          git -c protocol.version=2 fetch --no-tags --prune --depth=1 origin "$env:GITHUB_SHA"
          git checkout --detach FETCH_HEAD

      - name: Restore locked compliance graph
        run: dotnet restore tests/VRRecorder.Compliance.Tests/VRRecorder.Compliance.Tests.csproj --runtime win-x64 --locked-mode

      - name: Verify repository and README parity
        run: dotnet test tests/VRRecorder.Compliance.Tests/VRRecorder.Compliance.Tests.csproj --configuration Release --runtime win-x64 --no-restore
